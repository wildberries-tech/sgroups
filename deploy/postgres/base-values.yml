imagePullSecrets:
  - name: harbor-swarm-registry-secret
  - name: harbor-registry-secret

image:
  repository: postgres
  tag: 14.8
  pullPolicy: IfNotPresent

env:
  POSTGRES_USER: user_admin
  POSTGRES_PASSWORD: swarm
  POSTGRES_DB: swarm

ports:
  - name: postgres
    containerPort: 5432
    protocol: TCP

service:
  ports:
    - port: 5432
      name: postgres
      targetPort: 5432
